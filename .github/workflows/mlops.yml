name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'tests/**.py'
      - 'params.yaml'
      - 'requirements.txt'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest

    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to AWS
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          python - <<'EOF'
          import os, json

          creds = json.loads(os.environ["CLOUD_CREDENTIALS"])

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"AWS_ACCESS_KEY_ID={creds['aws_access_key_id']}\n")
              f.write(f"AWS_SECRET_ACCESS_KEY={creds['aws_secret_access_key']}\n")
              f.write(f"AWS_DEFAULT_REGION={creds.get('aws_region', 'ap-southeast-1')}\n")
          EOF

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv data/train_phase2.csv data/eval.csv

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
          echo "Accuracy=$ACC"

      - name: Upload model to S3
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket = os.environ["CLOUD_BUCKET"]
          key = "models/latest/model.pkl"

          s3 = boto3.client("s3")
          s3.upload_file("models/model.pkl", bucket, key)

          print(f"Uploaded models/model.pkl to s3://{bucket}/{key}")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Check eval gate
        env:
          ACCURACY: ${{ needs.train.outputs.accuracy }}
        run: |
          python - <<'EOF'
          import os

          acc = float(os.environ["ACCURACY"])
          threshold = 0.70

          if acc < threshold:
              raise SystemExit(f"Accuracy {acc:.4f} < {threshold}. Stop deploy.")

          print(f"Accuracy {acc:.4f} >= {threshold}. Deploy allowed.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest

    steps:
      - name: Restart service on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
        script: |
          sudo systemctl daemon-reload
          sudo systemctl restart mlops-serve

          for i in {1..20}; do
            if curl -f http://127.0.0.1:8000/health; then
              echo "Service is healthy"
              exit 0
            fi

            echo "Waiting for service..."
            sleep 5
          done

          sudo systemctl status mlops-serve --no-pager || true
          sudo journalctl -u mlops-serve -n 100 --no-pager || true
          echo "Service health check failed"
          exit 1
